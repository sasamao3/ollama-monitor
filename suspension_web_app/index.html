<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suspension Pro v2 | 究極のセッティング管理</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #16161a;
            --accent-primary: #7c3aed;
            --accent-secondary: #2dd4bf;
            --color-rebound: #00d2ff; /* 水色 */
            --color-compression: #ffd700; /* 黄色 */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg-primary) 70%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* --- Components --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--card-shadow);
            margin-bottom: 32px;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* --- Form --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .label-rebound { color: var(--color-rebound); opacity: 0.9; }
        .label-compression { color: var(--color-compression); opacity: 0.9; }

        input, textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2);
        }

        .section-tag {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            padding: 4px 12px;
            border-radius: 100px;
            font-weight: 700;
            margin-bottom: 8px;
            display: inline-block;
            border: 1px solid var(--glass-border);
        }

        /* --- Buttons --- */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), #6366f1);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(124, 58, 237, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }

        .btn-delete {
            padding: 6px 12px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-radius: 8px;
            font-size: 0.75rem;
            border: none;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        /* --- List --- */
        #settings-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .setting-card {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
        }

        .card-model {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            color: var(--accent-secondary);
            font-weight: 600;
        }

        .setting-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .val-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .val-text {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .color-reb { color: var(--color-rebound); }
        .color-com { color: var(--color-compression); }

        .memo-box {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-primary);
            white-space: pre-wrap;
        }

        .search-container {
            margin-bottom: 32px;
        }

        #search-input {
            width: 100%;
            padding: 16px 24px;
            font-size: 1.1rem;
            border-radius: 100px;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            color: white;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.5rem; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Suspension Pro v2</h1>
            <p>色の視覚化と詳細項目の拡張</p>
        </header>

        <!-- Input Section -->
        <section class="glass-card">
            <h2 id="form-heading"><span id="mode-icon">✨</span> <span id="mode-text">新規設定の追加</span></h2>
            <form id="suspension-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>バイクのモデル名</label>
                        <input type="text" id="modelName" placeholder="例: Honda CBR1000RR-R" required>
                    </div>
                    <div class="form-group full-width">
                        <label>走行場所 (LOCATION)</label>
                        <input type="text" id="location" placeholder="例: 筑波サーキット / 峠 / ツーリング">
                    </div>
                    
                    <!-- Front -->
                    <div class="form-group full-width"><span class="section-tag">Front Suspension</span></div>
                    <div class="form-group">
                        <label>Preload</label>
                        <input type="text" id="fPreload" placeholder="---">
                    </div>
                    <div class="form-group">
                        <label class="label-rebound">Rebound</label>
                        <input type="text" id="fRebound" placeholder="---">
                    </div>
                    <div class="form-group">
                        <label class="label-compression">Compression</label>
                        <input type="text" id="fCompression" placeholder="---">
                    </div>

                    <!-- Rear -->
                    <div class="form-group full-width"><span class="section-tag">Rear Suspension</span></div>
                    <div class="form-group">
                        <label>Preload</label>
                        <input type="text" id="rPreload" placeholder="---">
                    </div>
                    <div class="form-group">
                        <label class="label-rebound">REBOUND HI (Out)</label>
                        <input type="text" id="rReboundHi" placeholder="---">
                    </div>
                    <div class="form-group">
                        <label class="label-rebound">REBOUND LO (Inn)</label>
                        <input type="text" id="rReboundLo" placeholder="---">
                    </div>
                    <div class="form-group">
                        <label class="label-compression">COMPR. HI (Out)</label>
                        <input type="text" id="rCompHi" placeholder="---">
                    </div>
                    <div class="form-group">
                        <label class="label-compression">COMPR. LO (Inn)</label>
                        <input type="text" id="rCompLo" placeholder="---">
                    </div>

                    <!-- Additional -->
                    <div class="form-group full-width"><span class="section-tag">Additional Components</span></div>
                    <div class="form-group full-width">
                        <label>OVERSUSPENSION</label>
                        <input type="text" id="overSuspension" placeholder="設定値や状態を入力">
                    </div>
                    <div class="form-group full-width">
                        <label>RSC</label>
                        <input type="text" id="rsc" placeholder="設定値や状態を入力">
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Notes / Memo</label>
                        <textarea id="memo" placeholder="セッティングの感想や走行条件などを記入"></textarea>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        保存する
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">キャンセル</button>
                </div>
            </form>
        </section>

        <!-- Search -->
        <div class="search-container">
            <input type="text" id="search-input" placeholder="モデル名や走行場所で検索...">
        </div>

        <!-- List -->
        <div id="settings-list"></div>
    </div>

    <script>
        const STORAGE_KEY = 'suspension_pro_v2_data';
        let settings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let editId = null;

        const form = document.getElementById('suspension-form');
        const listContainer = document.getElementById('settings-list');
        const searchInput = document.getElementById('search-input');
        const cancelBtn = document.getElementById('cancel-btn');
        const modeText = document.getElementById('mode-text');
        const modeIcon = document.getElementById('mode-icon');
        const submitBtnText = document.getElementById('submit-btn').childNodes[2];

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
            render();
        }

        function render(filter = '') {
            listContainer.innerHTML = '';
            const filtered = settings.filter(s => 
                s.modelName.toLowerCase().includes(filter.toLowerCase()) ||
                (s.location && s.location.toLowerCase().includes(filter.toLowerCase())) ||
                (s.rsc && s.rsc.toLowerCase().includes(filter.toLowerCase()))
            );
            
            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'setting-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div style="display: flex; flex-direction: column; gap: 4px;">
                            <div class="card-model">${s.modelName}</div>
                            ${s.location ? `<div style="font-size: 0.8rem; color: var(--accent-secondary); opacity: 0.8;">📍 ${s.location}</div>` : ''}
                        </div>
                        <button class="btn-delete" onclick="remove('${s.id}')">削除</button>
                    </div>
                    <div class="setting-grid">
                        <div class="setting-item"><span class="val-label">F Pre</span><span class="val-text">${s.fPreload || '-'}</span></div>
                        <div class="setting-item"><span class="val-label color-reb">F Reb</span><span class="val-text color-reb">${s.fRebound || '-'}</span></div>
                        <div class="setting-item"><span class="val-label color-com">F Com</span><span class="val-text color-com">${s.fCompression || '-'}</span></div>
                        <div style="grid-column: 1/-1; height:1px; background:var(--glass-border); margin:4px 0;"></div>
                        <div class="setting-item"><span class="val-label">R Pre</span><span class="val-text">${s.rPreload || '-'}</span></div>
                        <div class="setting-item"><span class="val-label color-reb">R Reb H(O)</span><span class="val-text color-reb">${s.rReboundHi || '-'}</span></div>
                        <div class="setting-item"><span class="val-label color-reb">R Reb L(I)</span><span class="val-text color-reb">${s.rReboundLo || '-'}</span></div>
                        <div class="setting-item"><span class="val-label color-com">R Com H(O)</span><span class="val-text color-com">${s.rCompHi || '-'}</span></div>
                        <div class="setting-item"><span class="val-label color-com">R Com L(I)</span><span class="val-text color-com">${s.rCompLo || '-'}</span></div>
                        <div style="grid-column: 1/-1; height:1px; background:var(--glass-border); margin:4px 0;"></div>
                        <div class="setting-item" style="grid-column: 1/-1;"><span class="val-label">OVERSUSPENSION</span><span class="val-text">${s.overSuspension || '-'}</span></div>
                        <div class="setting-item" style="grid-column: 1/-1;"><span class="val-label">RSC</span><span class="val-text">${s.rsc || '-'}</span></div>
                    </div>
                    ${s.memo ? `<div class="memo-box">${s.memo}</div>` : ''}
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-secondary" style="flex: 1; justify-content: center; font-size: 0.85rem; padding: 10px;" onclick="startEdit('${s.id}')">編集</button>
                        <button class="btn btn-secondary" style="flex: 1; justify-content: center; font-size: 0.85rem; padding: 10px;" onclick="duplicate('${s.id}')">複製</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const data = {
                id: editId || Date.now().toString(),
                modelName: document.getElementById('modelName').value,
                location: document.getElementById('location').value,
                fPreload: document.getElementById('fPreload').value,
                fRebound: document.getElementById('fRebound').value,
                fCompression: document.getElementById('fCompression').value,
                rPreload: document.getElementById('rPreload').value,
                rReboundHi: document.getElementById('rReboundHi').value,
                rReboundLo: document.getElementById('rReboundLo').value,
                rCompHi: document.getElementById('rCompHi').value,
                rCompLo: document.getElementById('rCompLo').value,
                overSuspension: document.getElementById('overSuspension').value,
                rsc: document.getElementById('rsc').value,
                memo: document.getElementById('memo').value
            };

            if (editId) {
                settings = settings.map(s => s.id === editId ? data : s);
            } else {
                settings.unshift(data);
            }

            resetForm();
            save();
        };

        window.remove = (id) => {
            if(confirm('この設定を削除してもよろしいですか？')) {
                settings = settings.filter(s => s.id !== id);
                save();
            }
        };

        window.duplicate = (id) => {
            const s = settings.find(x => x.id === id);
            if(!s) return;
            const newData = { ...s, id: Date.now().toString() };
            newData.modelName = `${s.modelName} (複製)`;
            settings.unshift(newData);
            save();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.startEdit = (id) => {
            const s = settings.find(x => x.id === id);
            if(!s) return;
            editId = id;
            document.getElementById('modelName').value = s.modelName;
            document.getElementById('location').value = s.location || '';
            document.getElementById('fPreload').value = s.fPreload;
            document.getElementById('fRebound').value = s.fRebound;
            document.getElementById('fCompression').value = s.fCompression;
            document.getElementById('rPreload').value = s.rPreload;
            document.getElementById('rReboundHi').value = s.rReboundHi;
            document.getElementById('rReboundLo').value = s.rReboundLo;
            document.getElementById('rCompHi').value = s.rCompHi;
            document.getElementById('rCompLo').value = s.rCompLo;
            document.getElementById('overSuspension').value = s.overSuspension || '';
            document.getElementById('rsc').value = s.rsc || '';
            document.getElementById('memo').value = s.memo || '';

            modeText.innerText = '設定の編集';
            modeIcon.innerText = '📝';
            submitBtnText.textContent = ' 更新する';
            cancelBtn.style.display = 'inline-flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function resetForm() {
            editId = null;
            form.reset();
            modeText.innerText = '新規設定の追加';
            modeIcon.innerText = '✨';
            submitBtnText.textContent = ' 保存する';
            cancelBtn.style.display = 'none';
        }

        cancelBtn.onclick = resetForm;
        searchInput.oninput = (e) => render(e.target.value);
        render();
    </script>
</body>
</html>
